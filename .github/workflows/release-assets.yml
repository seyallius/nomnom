name: Build & Release Binaries

# Fires when release-plz pushes a version tag (e.g. v0.2.0).
# Builds native installers on each platform, then attaches them to the
# GitHub Release that release-plz already created.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Linux — .deb + .AppImage
  # ─────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (.deb + AppImage)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Cache cargo-binstall
        uses: actions/cache@v4
        id: cache-binstall
        with:
          path: |
            ~/.cargo/bin/cargo-binstall
            ~/.cargo/bin/binstall
          key: ${{ runner.os }}-cargo-binstall-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-binstall
        if: steps.cache-binstall.outputs.cache-hit != 'true'
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Cache dioxus-cli
        uses: actions/cache@v4
        id: cache-dioxus
        with:
          path: |
            ~/.cargo/bin/dx
            ~/.cargo/bin/dioxus
            ~/.cargo/bin/dioxus-cli
          key: ${{ runner.os }}-dioxus-cli-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dioxus-cli
        if: steps.cache-dioxus.outputs.cache-hit != 'true'
        run: cargo binstall dioxus-cli --no-confirm --locked

      - name: Bundle
        run: dx bundle --release

      - name: Upload .deb package
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/*.deb
          if-no-files-found: error

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage
          if-no-files-found: warn

      - name: Upload .rpm (if needed)
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: dist/*.rpm
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────
  # macOS — .dmg (arm64; runs on Apple Silicon runner)
  # ─────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (.dmg)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Cache cargo-binstall
        uses: actions/cache@v4
        id: cache-binstall
        with:
          path: |
            ~/.cargo/bin/cargo-binstall
            ~/.cargo/bin/binstall
          key: ${{ runner.os }}-cargo-binstall-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-binstall
        if: steps.cache-binstall.outputs.cache-hit != 'true'
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Cache dioxus-cli
        uses: actions/cache@v4
        id: cache-dioxus
        with:
          path: |
            ~/.cargo/bin/dx
            ~/.cargo/bin/dioxus
            ~/.cargo/bin/dioxus-cli
          key: ${{ runner.os }}-dioxus-cli-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dioxus-cli
        if: steps.cache-dioxus.outputs.cache-hit != 'true'
        run: cargo binstall dioxus-cli --no-confirm --locked

      - name: Bundle
        run: dx bundle --release

      - name: Upload .dmg package
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────
  # Windows — .msi
  # ─────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (.msi)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Cache cargo-binstall
        uses: actions/cache@v4
        id: cache-binstall
        with:
          path: |
            ~\.cargo\bin\cargo-binstall.exe
            ~\.cargo\bin\binstall.exe
          key: ${{ runner.os }}-cargo-binstall-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-binstall
        if: steps.cache-binstall.outputs.cache-hit != 'true'
        shell: bash
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Cache dioxus-cli
        uses: actions/cache@v4
        id: cache-dioxus
        with:
          path: |
            ~\.cargo\bin\dx.exe
            ~\.cargo\bin\dioxus.exe
            ~\.cargo\bin\dioxus-cli.exe
          key: ${{ runner.os }}-dioxus-cli-${{ hashFiles('**/Cargo.lock') }}

      - name: Install dioxus-cli
        if: steps.cache-dioxus.outputs.cache-hit != 'true'
        shell: bash
        run: cargo binstall dioxus-cli --no-confirm --locked

      - name: Bundle
        run: dx bundle --release

      - name: Upload .msi package
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: dist/*.msi
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────
  # Attach all artifacts to the GitHub Release release-plz already created
  # ─────────────────────────────────────────────────────────────────────────
  attach-release-assets:
    name: Attach to GitHub Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List artifacts
        run: find dist/ -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          # release-plz already created the release for this tag;
          # this step only uploads the binary assets to it.
          tag_name: ${{ github.ref_name }}
          files: |
            dist/**/*.deb
            dist/**/*.AppImage
            dist/**/*.dmg
            dist/**/*.msi
            dist/**/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}