name: Build & Release Binaries

# Fires when release-plz pushes a version tag (e.g. v0.2.0).
# Builds native installers on each platform, then attaches them to the
# GitHub Release that release-plz already created.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Linux — .deb + .AppImage
  # ─────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Linux (.deb + AppImage)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Dioxus CLI
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall dioxus-cli --no-confirm --locked

      - name: Bundle
        run: dx bundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: target/dx/nomnom/release/bundle/deb/*.deb
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: target/dx/nomnom/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────────
  # macOS — .dmg (arm64; runs on Apple Silicon runner)
  # ─────────────────────────────────────────────────────────────────────────
  build-macos:
    name: macOS (.dmg)
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Install Dioxus CLI
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall dioxus-cli --no-confirm --locked

      - name: Bundle
        run: dx bundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: target/dx/nomnom/release/bundle/dmg/*.dmg
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────
  # Windows — .msi
  # ─────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Windows (.msi)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Dioxus CLI
        shell: bash
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          cargo binstall dioxus-cli --no-confirm --locked

      - name: Bundle
        run: dx bundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: target/dx/nomnom/release/bundle/msi/*.msi
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────
  # Attach all artefacts to the GitHub Release release-plz already created
  # ─────────────────────────────────────────────────────────────────────────
  attach-release-assets:
    name: Attach to GitHub Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List artefacts
        run: find dist/ -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          # release-plz already created the release for this tag;
          # this step only uploads the binary assets to it.
          tag_name: ${{ github.ref_name }}
          files: |
            dist/**/*.deb
            dist/**/*.AppImage
            dist/**/*.dmg
            dist/**/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}