# git-cliff ~ configuration file
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog
All notable changes to this project will be documented in this file.

"""
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}

### {{ group | striptags | trim | upper_first }}

{% for commit in commits -%}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }} · *{{ commit.author.name }}* · [`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/seyallius/nomnom/commit/{{ commit.id }})
{% if commit.body %}
<details>
<summary>Details</summary>
{{ commit.body | trim }}
</details>
{% endif %}
{% endfor -%}
{% endfor -%}

"""
trim = true
footer = """
<!-- generated by git-cliff -->
"""
postprocessors = []

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_preprocessors = []
commit_parsers = [
    { message = "^feat",     group = "✨ Features" },
    { message = "^fix",      group = "🐛 Bug Fixes" },
    { message = "^bugfix",   group = "🐛 Bug Fixes" },
    { message = "^hotfix",   group = "🐛 Bug Fixes" },
    { message = "^doc",      group = "📚 Documentation" },
    { message = "^docs",     group = "📚 Documentation" },
    { message = "^perf",     group = "⚡ Performance" },
    { message = "^refactor", group = "♻️ Refactoring" },
    { message = "^style",    group = "🎨 Styling" },
    { message = "^test",     group = "🧪 Testing" },
    { message = "^chore",    group = "🔧 Miscellaneous Tasks" },
    { message = "^ci",       group = "👷 CI/CD" },
    { message = "^build",    group = "📦 Build System" },
    { message = ".*",        group = "📝 Other Commits" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"

[remote.github]
owner = "seyallius"
repo  = "nomnom"

[bump]
auto = true
files = ["Cargo.toml"]

[bump.commit_types]
major = "BREAKING CHANGE"
minor = "feat"
patch = "fix"