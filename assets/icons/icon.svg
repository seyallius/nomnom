<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <!--
      nomnom logo — assets/icons/icon.svg
      512×512 master source for gen_icons.sh
      Colours: brand purple #6c63ff, deep bg #0f0f1e
    -->

    <!-- Background -->
    <rect width="512" height="512" rx="96" fill="#0f0f1e"/>

    <!-- Outer ring glow (subtle) -->
    <circle cx="256" cy="220" r="168" fill="none" stroke="#6c63ff" stroke-width="1.5" opacity="0.20"/>
    <circle cx="256" cy="220" r="138" fill="none" stroke="#6c63ff" stroke-width="1" opacity="0.10"/>

    <!-- Download arrow shaft -->
    <rect x="228" y="80" width="56" height="130" rx="12" fill="#6c63ff"/>

    <!-- Arrowhead -->
    <polygon points="136,210 256,350 376,210" fill="#6c63ff"/>

    <!-- Mouth / landing plate — two stacked bars -->
    <rect x="134" y="366" width="244" height="26" rx="13" fill="#6c63ff" opacity="0.65"/>
    <rect x="166" y="402" width="180" height="18" rx="9" fill="#6c63ff" opacity="0.35"/>

    <!-- Orbit dots (accent detail) -->
    <circle cx="256" cy="56" r="9" fill="#8880ff" opacity="0.55"/>
    <circle cx="256" cy="384" r="9" fill="#8880ff" opacity="0.45"/>
    <circle cx="82" cy="220" r="6" fill="#6c63ff" opacity="0.30"/>
    <circle cx="430" cy="220" r="6" fill="#6c63ff" opacity="0.30"/>

    <!-- Wordmark -->
    <text
            x="256" y="478"
            text-anchor="middle"
            font-family="'JetBrains Mono','Fira Code','Courier New',monospace"
            font-size="52"
            font-weight="700"
            letter-spacing="6"
            fill="#6c63ff">nomnom
    </text>
</svg>